services:
  backend:
    build:
      context: ../backend
    container_name: mexc-ai-bot-backend
    env_file:
      - ../.env
    ports:
      - "8000:8000"
  frontend:
    build:
      context: ../frontend
    container_name: mexc-ai-bot-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
